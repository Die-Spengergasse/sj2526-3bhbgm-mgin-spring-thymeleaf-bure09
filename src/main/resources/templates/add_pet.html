<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Add New Pet</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <style>

        body{
            background-image: url('/images/Tiere.png');
            background-size: auto;
            background-position: center;
            background-repeat: repeat;
            height:100vh;
        }

        .container{
            margin-top:80px;
            max-width:600px;
            background: rgba(255,255,255,0.9);
            padding:30px;
            border-radius:12px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        .form-control{
            margin-top:15px;
            height:45px;
        }

        input[type="submit"]{
            background:#3498db;
            color:white;
            font-size:16px;
            border:none;
        }

        input[type="submit"]:hover{
            background:#2980b9;
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Add New Pet</h2>

    <form th:action="@{/pet/add}" th:object="${pet}" method="post">

        <input type="text" th:field="*{name}" class="form-control" placeholder="Pet name"> pet name

        <input type="date" th:field="*{birth}" class="form-control"> birth date

        <input type="text" th:field="*{type}" class="form-control" placeholder="Pet type"> type

        <input type="number" step="0.01" th:field="*{weight}" class="form-control" placeholder="Weight (kg)"> weight

        <input type="number" step="0.01" th:field="*{height}" class="form-control" placeholder="Height"> height

        <input type="text" th:field="*{owner}" class="form-control" placeholder="Owner"> owner

        <input type="submit" class="form-control btn btn-primary" value="Save Pet">

    </form>

</div>

</body>
</html>
